<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 30px 20px;
      line-height: 1.7;
    }

    h1, h2, h3 {
      color: #f1f5f9;
      margin-top: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    h2 {
      border-bottom: 1px solid #1e293b;
      padding-bottom: 5px;
    }

    p {
      color: #cbd5e1;
    }

    a {
      color: #3b82f6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      margin: 1.5rem 0;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    hr {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 2rem 0;
    }

    ul {
      padding-left: 1.2rem;
    }

    li {
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

{{ content }}

</body>
</html>
